services:
  - type: web
    name: internal-helpdesk-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace=apps/api
    startCommand: npm run start:prod --workspace=apps/api
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: 0.0.0.0
