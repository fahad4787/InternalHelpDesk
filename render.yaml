services:
  - type: web
    name: internal-helpdesk-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_API_URL
        value: https://internal-helpdesk-api.onrender.com
      - key: FRONTEND_URL
        value: https://internal-help-desk-web-q2fw.vercel.app
      - key: ASANA_REDIRECT_URI
        value: https://internal-helpdesk-api.onrender.com/api/integrations/asana/callback
      - key: ASANA_SCOPES
        value: projects:read tasks:read users:read
      - key: ASANA_CLIENT_ID
        sync: false
      - key: ASANA_CLIENT_SECRET
        sync: false
      - key: MONDAY_REDIRECT_URI
        value: https://internal-helpdesk-api.onrender.com/api/integrations/monday/callback
      - key: MONDAY_SCOPES
        value: me:read boards:read account:read
      - key: MONDAY_CLIENT_ID
        sync: false
      - key: MONDAY_CLIENT_SECRET
        sync: false
      - key: CLICKUP_REDIRECT_URI
        value: https://internal-helpdesk-api.onrender.com/api/integrations/clickup/callback
      - key: CLICKUP_CLIENT_ID
        sync: false
      - key: CLICKUP_CLIENT_SECRET
        sync: false
      - key: BOX_REDIRECT_URI
        value: https://internal-helpdesk-api.onrender.com/api/integrations/box/callback
      - key: BOX_CLIENT_ID
        sync: false
      - key: BOX_CLIENT_SECRET
        sync: false
      - key: HUBSPOT_REDIRECT_URI
        value: https://internal-helpdesk-api.onrender.com/api/integrations/hubspot/callback
      - key: HUBSPOT_SCOPES
        value: crm.objects.contacts.read crm.objects.deals.read
      - key: HUBSPOT_CLIENT_ID
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: OUTLOOK_REDIRECT_URI
        value: https://internal-helpdesk-api.onrender.com/api/integrations/outlook/callback
      - key: OUTLOOK_SCOPES
        value: Mail.Read User.Read offline_access
      - key: OUTLOOK_CLIENT_ID
        sync: false
      - key: OUTLOOK_CLIENT_SECRET
        sync: false
